<div>
  <div class="dynamic-options__header">
    <h3 class="dynamic-options__header__title">{{ title() }}</h3>
    <button mat-icon-button (click)="addOption()">
      <mat-icon>add_circle</mat-icon>
    </button>
  </div>

  <div class="dynamic-options">
    @for (option of options(); track option.value; let i = $index) {
      <div class="dynamic-options__item">
        <mat-form-field class="dynamic-options__item__field">
          <input matInput [ngModel]="option.label" (ngModelChange)="updateOption(i, $event)" />
        </mat-form-field>
        <button mat-icon-button (click)="removeOption(i)">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    }
  </div>
</div>
