@if (contentTabs()) {
  <mat-tab-group
    #tabGroup
    [(selectedIndex)]="selectedTabIndex"
    (selectedTabChange)="onTabChange($event)"
    class="app-tab-routing-manager-container gap-2"
    dynamicHeight
    mat-stretch-tabs="false"
    mat-align-tabs="start"
  >
    @for (tab of contentTabs(); track tab.label()) {
      <mat-tab [label]="tab.label()" [disabled]="tab.disabled()">
        <div [cdkPortalOutlet]="tab.portal"></div>
      </mat-tab>
    }
  </mat-tab-group>
}
<ng-content select="app-tab-route"></ng-content>
