<cdk-virtual-scroll-viewport
  class="vh-100"
  [itemSize]="itemSize()"
  [minBufferPx]="minBufferPx()"
  [maxBufferPx]="maxBufferPx()"
>
  <ng-container [ngTemplateOutlet]="cardContentHeader()">
    <ng-content></ng-content>
  </ng-container>

  @if (headerBuffer()) {
    <div class="card-container-buffer"></div>
  }

  <div class="row">
    <div *cdkVirtualFor="let card of virtualDatasource" [class]="{ 'col-6': viewType() === 'grid' }">
      @if (card) {
        <app-card
          [class]="'virtual-cards-' + viewType()"
          [class]="cardClass()"
          (click)="rowClick.emit(card)"
          (keydown)="rowClick.emit(card)"
        >
          <div [class]="'virtual-cards__' + viewType() + '__content'">
            <ng-container [ngTemplateOutlet]="cardContent()" [ngTemplateOutletContext]="{ card: card }">
              <ng-content></ng-content>
            </ng-container>
          </div>
        </app-card>
      }
    </div>

    @if (virtualDatasource?.loading()) {
      <ng-container
        [ngTemplateOutlet]="gridLoadingTemplate"
        [ngTemplateOutletContext]="{ type: viewType() }"
      ></ng-container>
    }

    @if (virtualDatasource?.noResults()) {
      <div class="col-12">
        <p class="text-center mt-5">No results found</p>
      </div>
    }
  </div>

  <div class="card-container-buffer"></div>
</cdk-virtual-scroll-viewport>

<ng-template #gridLoadingTemplate let-type="type">
  @for (l of [1, 2, 3, 4, 5, 6]; track l) {
    @if (type === 'grid') {
      <div class="col-6">
        <app-card class="virtual-cards__grid" [class]="cardClass()">
          <div class="virtual-cards__grid__content">
            <div *skeletonLoading="true; height: 209"></div>
            <div class="mt-3 d-flex flex-column gap-1">
              <div *skeletonLoading="true; width: '50%'; height: 12; align: 'left'"></div>
              <div *skeletonLoading="true; width: '25%'; height: 12; align: 'left'"></div>
              <div *skeletonLoading="true; width: '50%'; height: 12; align: 'left'"></div>
              <div
                *skeletonLoading="true; width: '12%'; height: 12; align: 'left'; theme: { 'margin-bottom': '16px' }"
              ></div>
            </div>

            <div class="d-flex justify-content-between align-items-center gap-2">
              <div *skeletonLoading="true; width: 24; height: 12"></div>
              <div *skeletonLoading="true; size: 24; appearance: 'square'"></div>
            </div>
          </div>
        </app-card>
      </div>
    } @else {
      <div>
        <app-card class="virtual-cards__single">
          <div class="d-flex gap-3">
            <div *skeletonLoading="true; height: 110; width: 80"></div>
            <div class="d-flex flex-column gap-1 w-100">
              <div *skeletonLoading="true; width: '50%'; height: 12; align: 'left'"></div>
              <div *skeletonLoading="true; width: '25%'; height: 12; align: 'left'"></div>
              <div *skeletonLoading="true; width: '40%'; height: 12; align: 'left'"></div>
              <div *skeletonLoading="true; width: '40%'; height: 12; align: 'left'"></div>
            </div>
            <div class="w-100 d-flex flex-column align-items-end gap-1">
              <div *skeletonLoading="true; width: 32; height: 12"></div>
              <div *skeletonLoading="true; width: 32; height: 12"></div>
              <div *skeletonLoading="true; width: 16; height: 12; theme: { 'margin-bottom': '16px' }"></div>
              <div *skeletonLoading="true; size: 24; appearance: 'square'"></div>
            </div>
          </div>
        </app-card>
      </div>
    }
  }
</ng-template>
