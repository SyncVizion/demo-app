<app-card class="text-center mt-4">
  <h2>Please verify your email</h2>

  <p>You're almost there! We sent an email to</p>
  <p>
    <strong>{{ email }}</strong>
  </p>

  <p>
    Just click on the link in that email to complete your signup. If you don't see it, you may need to check your spam
    folder.
  </p>

  <div class="d-flex align-items-center justify-content-center mt-4">
    <button app-button variant="brand" emphasis="primary" (click)="checkVerification()">Check Verification</button>
  </div>
</app-card>
