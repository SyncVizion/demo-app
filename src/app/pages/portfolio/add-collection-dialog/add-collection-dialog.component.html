<h1 mat-dialog-title>Add Collection</h1>
@if (loading) {
  <div class="dialog-spinner">
    <mat-spinner></mat-spinner>
  </div>
} @else {
  <div mat-dialog-content style="padding-top: 4px">
    @if (form) {
      <form [formGroup]="form" class="form">
        <app-form-field-input label="Title" formControlName="title"></app-form-field-input>
        <app-form-field-checkbox label="Public Collection" formControlName="publicCollection"></app-form-field-checkbox>
      </form>
    }
  </div>
  <div class="action-bar action-bar--dialog">
    <button app-button variant="brand" emphasis="secondary" (click)="close()">Cancel</button>
    <button
      app-button
      variant="brand"
      emphasis="primary"
      [disabled]="form?.invalid || form?.pending || form?.pristine"
      (click)="updateCreate()"
    >
      {{ data?.id ? 'Update' : 'Create' }}
    </button>
  </div>
}
